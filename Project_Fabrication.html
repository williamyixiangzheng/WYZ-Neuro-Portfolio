    <style>
        :root{--bg:#ffffff;--ink:#1a1a1a;--muted:#6b7280;--soft:#9ca3af;--line:#e7e7e7;--accent:#1f6feb;--sidebar:#15294d;--sidebar-soft:rgba(255,255,255,0.72);--sidebar-line:rgba(255,255,255,0.14);--sidebar-active:#ffd166;--sidebar-w:280px;}
        *{box-sizing:border-box;}
        html{overflow-y:scroll;}
        body{margin:0;color:var(--ink);background:var(--bg);font-family:"Inter",-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;line-height:1.65;font-size:16px;}
        a{color:var(--accent);text-decoration:none;}
        a:hover{text-decoration:underline;}
        .sidebar{position:fixed;top:0;left:0;width:var(--sidebar-w);height:100vh;background:var(--sidebar);color:#fff;display:flex;flex-direction:column;align-items:center;text-align:center;padding:40px 26px;overflow-y:auto;}
        .sidebar .avatar{width:150px;height:150px;border-radius:50%;object-fit:cover;display:block;border:3px solid rgba(255,255,255,0.18);margin-bottom:20px;}
        .sidebar .name{font-family:"Newsreader",Georgia,serif;font-weight:600;font-size:1.5rem;line-height:1.2;margin:0 0 8px;color:#fff;}
        .sidebar .tag{color:var(--sidebar-soft);font-size:0.78rem;white-space:nowrap;margin:0 0 14px;}
        .sidebar .scholar{display:inline-block;color:#fff;font-size:0.9rem;font-weight:500;padding:6px 14px;border:1px solid var(--sidebar-line);border-radius:999px;margin-bottom:26px;}
        .sidebar .scholar:hover{background:rgba(255,255,255,0.10);text-decoration:none;}
        .sidebar nav{width:100%;border-top:1px solid var(--sidebar-line);padding-top:18px;}
        .sidebar nav a{display:block;color:var(--sidebar-soft);font-size:0.98rem;font-weight:500;padding:9px 0;border-radius:6px;transition:color 0.15s ease;}
        .sidebar nav a:hover{color:#fff;text-decoration:none;}
        .sidebar nav a.active{color:var(--sidebar-active);font-weight:600;}
        .content{margin-left:var(--sidebar-w);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:60px 24px;}
        .soon{max-width:480px;text-align:center;}
        .badge-soon{display:inline-block;background:#fff4d6;color:#8a6d1a;font-size:0.78rem;font-weight:700;letter-spacing:0.04em;text-transform:uppercase;padding:5px 12px;border-radius:999px;margin-bottom:16px;}
        .soon h1{font-family:"Newsreader",Georgia,serif;font-weight:600;font-size:2.2rem;margin:0 0 12px;}
        .soon p{color:var(--muted);margin:0 0 24px;}
        .back-btn{display:inline-block;background:var(--sidebar);color:#fff;font-weight:500;font-size:0.92rem;padding:10px 20px;border-radius:999px;}
        .back-btn:hover{background:#1d3666;text-decoration:none;color:#fff;}
        @media(max-width:900px){
            :root{--sidebar-w:0px;}
            .sidebar{position:static;width:100%;height:auto;flex-direction:column;padding:28px 26px;}
            .sidebar nav{display:flex;flex-wrap:wrap;justify-content:center;gap:4px 18px;}
            .sidebar nav a{padding:6px 0;}
            .content{margin-left:0;min-height:auto;padding:60px 24px;}
        }
    </style>
